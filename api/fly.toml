app = "daily-learn-api"
primary_region = "iad"

[build]

[deploy]
  release_command = "node api/dist/db/migrate.js"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
