name: API CI & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  ci:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=api

      - name: Typecheck
        run: npm run typecheck --workspace=api

      - name: Build
        run: npm run build --workspace=api

  deploy:
    name: Deploy to Northflank
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Northflank redeploy
        run: |
          SHA="${{ github.sha }}"
          curl -sf -X POST \
            "https://api.northflank.com/v1/projects/${{ secrets.NORTHFLANK_PROJECT_ID }}/services/${{ secrets.NORTHFLANK_SERVICE_ID }}/build" \
            -H "Authorization: Bearer ${{ secrets.NORTHFLANK_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"sha\": \"$SHA\"}"
