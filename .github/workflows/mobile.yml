name: Mobile CI

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  ci:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=mobile

      - name: Typecheck
        run: npm run typecheck --workspace=mobile
